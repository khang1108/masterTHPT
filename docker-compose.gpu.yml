# docker-compose.gpu.yml

version: '3.8'

services:
  vllm-manager:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8080:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    command: >
      --model Qwen/Qwen3-8B
      --max-model-len 8192
      --gpu-memory-utilization 0.25
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-teacher:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8081:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    command: >
      --model Qwen/Qwen3-14B-GPTQ-Int4
      --max-model-len 8192
      --quantization gptq
      --gpu-memory-utilization 0.30
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-verifier:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8082:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    command: >
      --model google/gemma-3-4b
      --max-model-len 4096
      --gpu-memory-utilization 0.15
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-adaptive:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8083:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    command: >
      --model Qwen/Qwen3-8B
      --max-model-len 8192
      --gpu-memory-utilization 0.25
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
  vllm-parser:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    ports:
      - "8084:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    command: >
      --model Qwen/Qwen3-8B
      --max-model-len 8192
      --gpu-memory-utilization 0.25
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]