<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MASTER Knowledge Graph Viewer</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --subtle: #6b7280;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }
    #network {
      width: 100%;
      height: calc(100vh - 32px);
    }
    .sidebar { padding: 16px; }
    .sidebar h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 18px;
    }
    .meta {
      color: var(--subtle);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .details {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .legend {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      font-size: 13px;
      color: var(--subtle);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.18);
    }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      #network {
        height: 68vh;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="card">

    <aside class="card sidebar">

      </div>
    </aside>
  </main>

      const byId = new Map(nodesRaw.map((node) => [node.id, node]));

      for (const edge of edgesRaw) {
        const from = byId.get(edge.from);
        const to = byId.get(edge.to);
        if (!from || !to) continue;
        const line = document.createElementNS(svgNs, "line");
        line.setAttribute("x1", String(scaleX(Number(from.x ?? 0))));
        line.setAttribute("y1", String(scaleY(Number(from.y ?? 0))));
        line.setAttribute("x2", String(scaleX(Number(to.x ?? 0))));
        line.setAttribute("y2", String(scaleY(Number(to.y ?? 0))));
        line.setAttribute("stroke", edge?.color?.color || "#94a3b8");
        line.setAttribute("stroke-opacity", "0.55");
        line.setAttribute("stroke-width", "1.2");
        svg.appendChild(line);
      }

      for (const node of nodesRaw) {
        const circle = document.createElementNS(svgNs, "circle");
        circle.setAttribute("cx", String(scaleX(Number(node.x ?? 0))));
        circle.setAttribute("cy", String(scaleY(Number(node.y ?? 0))));
        circle.setAttribute("r", String(Math.max(4, Math.min(12, 2 + Math.sqrt(Number(node.value || 1))))));
        circle.setAttribute("fill", node?.color?.background || "#2E86DE");
        circle.setAttribute("stroke", "#111827");
        circle.setAttribute("stroke-width", "0.8");
        circle.style.cursor = "pointer";
        circle.addEventListener("click", () => showNodeDetails(node));
        svg.appendChild(circle);
      }

      const note = document.createElement("div");
      note.className = "meta";
      note.textContent = reason
        ? `Fallback mode: ${reason}`
        : "Fallback mode: SVG renderer";
      networkEl.appendChild(svg);
      networkEl.appendChild(note);
    };

    const bootVis = () => {
      if (typeof vis === "undefined") {
        renderFallbackSvg("vis-network CDN unavailable");
        return;
      }

      try {
        const nodes = new vis.DataSet(nodesRaw);
        const edges = new vis.DataSet(edgesRaw);

        const network = new vis.Network(
          networkEl,
          { nodes, edges },
          {
            autoResize: true,
            interaction: {
              hover: true,
              navigationButtons: true,
              multiselect: true,
              tooltipDelay: 120,
            },
            nodes: {
              shape: "dot",
              borderWidth: 1,
              font: {
                face: "Segoe UI, Tahoma, sans-serif",
                size: 13,
              },
              scaling: { min: 8, max: 30 },
            },
            edges: {
              arrows: { to: { enabled: true, scaleFactor: 0.55 } },
              width: 1.2,
              smooth: { type: "continuous" },
            },
            physics: {
              enabled: true,
              stabilization: { iterations: 220 },
              forceAtlas2Based: {
                gravitationalConstant: -50,
                centralGravity: 0.01,
                springLength: 120,
                springConstant: 0.08,
              },
              solver: "forceAtlas2Based",
            },
          }
        );

        network.on("selectNode", (params) => {
          const node = nodes.get(params.nodes[0]);
          showNodeDetails(node);
        });

        network.on("deselectNode", () => {
          detailsEl.textContent = "Select a node to see metadata.";
        });
      } catch (error) {
        console.error("Knowledge graph render error:", error);
        renderFallbackSvg(error?.message || "runtime error");
      }
    };

    bootVis();
  </script>
</body>
</html>
