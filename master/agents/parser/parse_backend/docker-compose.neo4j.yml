version: "3.9"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: masterthpt_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol (driver connection)
    environment:
      - NEO4J_AUTH=neo4j/masterthpt2026
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
      - NEO4J_dbms_memory_pagecache_size=256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - masterthpt_net

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  masterthpt_net:
    driver: bridge
