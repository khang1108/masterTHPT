name: Build and deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: southeastasia
  CONTAINERAPPS_ENV_NAME: masterthpt-env
  AI_APP_NAME: masterthpt-ai
  API_APP_NAME: masterthpt-api
  WEB_APP_NAME: masterthpt-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate ACR login server format
        run: |
          set -euo pipefail
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          if [[ -z "${REGISTRY}" ]]; then
            echo "::error::ACR_LOGIN_SERVER secret is empty"
            exit 1
          fi
          if [[ "${REGISTRY}" == https://* ]]; then
            echo "::error::ACR_LOGIN_SERVER must be like masterthptacr.azurecr.io (without https://)"
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry via OIDC token
        run: |
          set -euo pipefail
          ACR_NAME="$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)"
          TOKEN="$(az acr login --name "${ACR_NAME}" --expose-token --output tsv --query accessToken)"
          echo "${TOKEN}" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./master/apps/api
          file: ./master/apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./master/apps/web
          file: ./master/apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-web:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-web:latest
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_API_URL=/api
            API_PROXY_TARGET=http://${{ env.API_APP_NAME }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push AI image
        uses: docker/build-push-action@v5
        with:
          context: ./master/agents
          file: ./master/agents/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-ai:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-ai:latest
          cache-from: type=gha,scope=ai
          cache-to: type=gha,mode=max,scope=ai


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Container Apps environment
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            az containerapp env show \
              --name "${{ env.CONTAINERAPPS_ENV_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --output none

      - name: Create or update AI container app
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            ACR_NAME="$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)"
            ACR_USERNAME="$(az acr credential show -n "${ACR_NAME}" --query username -o tsv)"
            ACR_PASSWORD="$(az acr credential show -n "${ACR_NAME}" --query 'passwords[0].value' -o tsv)"

            SECRET_ARGS=(
              mongo-uri="${{ secrets.MONGO_URI }}"
            )

            if [ -n "${{ secrets.FPT_API_KEY }}" ]; then
              SECRET_ARGS+=(fpt-api-key="${{ secrets.FPT_API_KEY }}")
            fi

            if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
              SECRET_ARGS+=(gemini-api-key="${{ secrets.GEMINI_API_KEY }}")
            fi

            if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
              SECRET_ARGS+=(openai-api-key="${{ secrets.OPENAI_API_KEY }}")
            fi

            if [ -n "${{ secrets.LANGSMITH_API_KEY }}" ]; then
              SECRET_ARGS+=(langsmith-api-key="${{ secrets.LANGSMITH_API_KEY }}")
            fi

            ENV_ARGS=(
              PORT=8001
              MONGO_URI=secretref:mongo-uri
              MONGO_DB_NAME="${{ vars.MONGO_DB_NAME || 'masterthpt' }}"
              FPT_BASE_URL="${{ vars.FPT_BASE_URL || 'https://mkp-api.fptcloud.com' }}"
              FPT_LLM_BASE_URL="${{ vars.FPT_BASE_URL || 'https://mkp-api.fptcloud.com' }}"
              FPT_LLM_MODEL="${{ vars.FPT_LLM_MODEL || 'SaoLa-Llama3.1-planner' }}"
              LLM_MODEL="${{ vars.FPT_LLM_MODEL || 'SaoLa-Llama3.1-planner' }}"
              LANGSMITH_TRACING="${{ vars.LANGSMITH_TRACING || 'true' }}"
              LANGSMITH_ENDPOINT="${{ vars.LANGSMITH_ENDPOINT || 'https://api.smith.langchain.com' }}"
              LANGSMITH_PROJECT="${{ vars.LANGSMITH_PROJECT || 'masterthpt' }}"
            )

            if [ -n "${{ secrets.FPT_API_KEY }}" ]; then
              ENV_ARGS+=(
                FPT_API_KEY=secretref:fpt-api-key
                FPT_LLM_API_KEY=secretref:fpt-api-key
                OPENAI_COMPATIBLE_API_KEY=secretref:fpt-api-key
              )
            fi

            if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
              ENV_ARGS+=(
                GEMINI_API_KEY=secretref:gemini-api-key
                GOOGLE_API_KEY=secretref:gemini-api-key
              )
            fi

            if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
              ENV_ARGS+=(
                OPENAI_API_KEY=secretref:openai-api-key
              )
            fi

            if [ -n "${{ secrets.LANGSMITH_API_KEY }}" ]; then
              ENV_ARGS+=(
                LANGSMITH_API_KEY=secretref:langsmith-api-key
              )
            fi

            if az containerapp show \
              --name "${{ env.AI_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then
              az containerapp secret set \
                --name "${{ env.AI_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --secrets "${SECRET_ARGS[@]}"

              az containerapp registry set \
                --name "${{ env.AI_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --server "${{ secrets.ACR_LOGIN_SERVER }}" \
                --username "${ACR_USERNAME}" \
                --password "${ACR_PASSWORD}"

              az containerapp update \
                --name "${{ env.AI_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --image "${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-ai:${{ github.sha }}" \
                --set-env-vars "${ENV_ARGS[@]}"
            else
              az containerapp create \
                --name "${{ env.AI_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --environment "${{ env.CONTAINERAPPS_ENV_NAME }}" \
                --image "${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-ai:${{ github.sha }}" \
                --registry-server "${{ secrets.ACR_LOGIN_SERVER }}" \
                --registry-username "${ACR_USERNAME}" \
                --registry-password "${ACR_PASSWORD}" \
                --ingress internal \
                --target-port 8001 \
                --min-replicas 1 \
                --max-replicas 2 \
                --cpu 1 \
                --memory 2.0Gi \
                --secrets "${SECRET_ARGS[@]}" \
                --env-vars "${ENV_ARGS[@]}"
            fi


      - name: Create or update API container app
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            ACR_NAME="$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)"
            ACR_USERNAME="$(az acr credential show -n "${ACR_NAME}" --query username -o tsv)"
            ACR_PASSWORD="$(az acr credential show -n "${ACR_NAME}" --query 'passwords[0].value' -o tsv)"

            GOOGLE_CLIENT_ID_VALUE="${{ secrets.GOOGLE_CLIENT_ID }}"
            if [ -z "${GOOGLE_CLIENT_ID_VALUE}" ]; then
              GOOGLE_CLIENT_ID_VALUE="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}"
            fi

            if az containerapp show \
              --name "${{ env.API_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then
              az containerapp secret set \
                --name "${{ env.API_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --secrets \
                  database-url="${{ secrets.DATABASE_URL }}" \
                  jwt-secret="${{ secrets.JWT_SECRET }}"

              az containerapp registry set \
                --name "${{ env.API_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --server "${{ secrets.ACR_LOGIN_SERVER }}" \
                --username "${ACR_USERNAME}" \
                --password "${ACR_PASSWORD}"

              az containerapp update \
                --name "${{ env.API_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --image "${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-api:${{ github.sha }}" \
                --set-env-vars \
                  PORT=3001 \
                  DATABASE_URL=secretref:database-url \
                  JWT_SECRET=secretref:jwt-secret \
                  JWT_EXPIRES_IN=30d \
                  GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID_VALUE}" \
                  AI_API_BASE_URL="http://${{ env.AI_APP_NAME }}/invoke" \
                  USE_MOCK_SERVICES=true
            else
              az containerapp create \
                --name "${{ env.API_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --environment "${{ env.CONTAINERAPPS_ENV_NAME }}" \
                --image "${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-api:${{ github.sha }}" \
                --registry-server "${{ secrets.ACR_LOGIN_SERVER }}" \
                --registry-username "${ACR_USERNAME}" \
                --registry-password "${ACR_PASSWORD}" \
                --ingress internal \
                --target-port 3001 \
                --min-replicas 1 \
                --max-replicas 3 \
                --cpu 2 \
                --memory 4.0Gi \
                --secrets \
                  database-url="${{ secrets.DATABASE_URL }}" \
                  jwt-secret="${{ secrets.JWT_SECRET }}" \
                --env-vars \
                  PORT=3001 \
                  DATABASE_URL=secretref:database-url \
                  JWT_SECRET=secretref:jwt-secret \
                  JWT_EXPIRES_IN=30d \
                  GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID_VALUE}" \
                  AI_API_BASE_URL="http://${{ env.AI_APP_NAME }}/invoke" \
                  USE_MOCK_SERVICES=true
            fi

      - name: Create or update Web container app
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            ACR_NAME="$(echo "${{ secrets.ACR_LOGIN_SERVER }}" | cut -d'.' -f1)"
            ACR_USERNAME="$(az acr credential show -n "${ACR_NAME}" --query username -o tsv)"
            ACR_PASSWORD="$(az acr credential show -n "${ACR_NAME}" --query 'passwords[0].value' -o tsv)"

            if az containerapp show \
              --name "${{ env.WEB_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then
              az containerapp registry set \
                --name "${{ env.WEB_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --server "${{ secrets.ACR_LOGIN_SERVER }}" \
                --username "${ACR_USERNAME}" \
                --password "${ACR_PASSWORD}"

              az containerapp update \
                --name "${{ env.WEB_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --image "${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-web:${{ github.sha }}" \
                --set-env-vars \
                  PORT=3000 \
                  NEXT_PUBLIC_API_URL=/api \
                  API_PROXY_TARGET="http://${{ env.API_APP_NAME }}" \
                  NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}"
            else
              az containerapp create \
                --name "${{ env.WEB_APP_NAME }}" \
                --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
                --environment "${{ env.CONTAINERAPPS_ENV_NAME }}" \
                --image "${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-web:${{ github.sha }}" \
                --registry-server "${{ secrets.ACR_LOGIN_SERVER }}" \
                --registry-username "${ACR_USERNAME}" \
                --registry-password "${ACR_PASSWORD}" \
                --ingress external \
                --target-port 3000 \
                --min-replicas 1 \
                --max-replicas 3 \
                --cpu 0.5 \
                --memory 1.0Gi \
                --env-vars \
                  PORT=3000 \
                  NEXT_PUBLIC_API_URL=/api \
                  API_PROXY_TARGET="http://${{ env.API_APP_NAME }}" \
                  NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}"
            fi

      - name: Print web URL
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            WEB_FQDN=$(az containerapp show \
              --name "${{ env.WEB_APP_NAME }}" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query "properties.configuration.ingress.fqdn" -o tsv)
            echo "Web URL: https://${WEB_FQDN}"
