name: Build and deploy to Azure App Service (Docker)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. masterthptacr.azurecr.io
  IMAGE_TAG: ${{ github.sha }}
  DATABASE_URL: ${{ secrets.DATABASE_URL}}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL}}
  API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET}}
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID}}
  NEXT_PUBLIC_GOOGLE_SECRET: ${{ secrets.NEXT_PUBLIC_GOOGLE_SECRET}}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./master/apps/api
          file: ./master/apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./master/apps/web
          file: ./master/apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-web:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/masterthpt-web:latest
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            API_PROXY_TARGET=${{ secrets.API_PROXY_TARGET }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Prepare compose file with substituted variables
        run: |
          export ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
          export IMAGE_TAG=${{ github.sha }}
          envsubst '${ACR_LOGIN_SERVER} ${IMAGE_TAG}' < infra/docker-compose-azure.yml > infra/docker-compose-deploy.yml
          cat infra/docker-compose-deploy.yml

      - name: Upload compose file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: compose-deploy
          path: infra/docker-compose-deploy.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Download compose file
        uses: actions/download-artifact@v4
        with:
          name: compose-deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service to use ACR
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config container set \
              --name masterTHPT \
              --resource-group DefaultResourceGroup-CCAN \
              --multicontainer-config-type compose \
              --multicontainer-config-file docker-compose-deploy.yml \
              --container-registry-url https://${{ secrets.ACR_LOGIN_SERVER }} \
              --container-registry-user ${{ secrets.ACR_USERNAME }} \
              --container-registry-password ${{ secrets.ACR_PASSWORD }}

      - name: Set App Service environment variables
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config appsettings set \
              --name masterTHPT \
              --resource-group DefaultResourceGroup-CCAN \
              --settings \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}" \

      - name: Enable Always On to prevent cold starts
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config set \
              --name masterTHPT \
              --resource-group DefaultResourceGroup-CCAN \
              --always-on true

      - name: Restart App Service
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp restart --name masterTHPT --resource-group DefaultResourceGroup-CCAN
